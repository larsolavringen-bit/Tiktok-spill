<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Crowd Runner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-top">
      <div id="coin-display">🪙 <span id="coin-count">0</span></div>
      <div id="level-label">Level 1</div>
    </div>
    <div id="progress-bar-wrap">
      <div id="progress-bar-fill"></div>
      <span id="progress-pct">0%</span>
    </div>
  </div>

  <!-- Bomb button (visible during play) -->
  <div id="bomb-btn" class="hidden">
    <span id="bomb-icon">💣</span>
    <span id="bomb-count">0</span>
  </div>

  <!-- Start screen -->
  <div id="start-screen" class="overlay">
    <h1>CROWD<br/>RUNNER</h1>
    <p class="subtitle">Vokse mengden, bekjemp fiender!</p>
    <div class="start-btns">
      <button id="start-btn">TAP FOR Å STARTE</button>
      <button id="shop-open-btn" class="btn-shop">BUTIKK</button>
    </div>
  </div>

  <!-- Shop screen -->
  <div id="shop-screen" class="overlay hidden">
    <div class="shop-panel">
      <div class="shop-title">BUTIKK</div>

      <div class="shop-balance">
        <span class="shop-balance-icon">●</span>
        <span id="shop-coin-count">0</span>
      </div>

      <div class="shop-cards">

        <!-- Soldier upgrade -->
        <div class="shop-card">
          <div class="shop-card-icon">🪖</div>
          <div class="shop-card-body">
            <div class="shop-card-title">Flere soldater</div>
            <div id="soldier-dots" class="shop-dots"></div>
          </div>
          <button id="buy-soldiers-btn" class="btn-buy-card">
            <span id="soldiers-cost-txt">40</span>&nbsp;●
          </button>
        </div>

        <!-- Bomb -->
        <div class="shop-card">
          <div class="shop-card-icon">💣</div>
          <div class="shop-card-body">
            <div class="shop-card-title">Bombe</div>
            <div id="bomb-dots" class="shop-dots"></div>
          </div>
          <button id="buy-bomb-btn" class="btn-buy-card">
            80&nbsp;●
          </button>
        </div>

      </div>

      <button id="shop-close-btn" class="btn-back-shop">TILBAKE</button>
    </div>
  </div>

  <!-- Game Over screen -->
  <div id="gameover-screen" class="overlay hidden">
    <h1>GAME OVER</h1>
    <p id="final-score">Du kom til Level 0</p>
    <p id="high-score-display">Rekord: 0</p>
    <p id="gameover-coins"></p>
    <div class="start-btns">
      <button id="restart-btn">SPILL IGJEN</button>
      <button id="gameover-shop-btn" class="btn-shop">BUTIKK</button>
    </div>
  </div>

  <!-- Victory screen (boss defeated) -->
  <div id="victory-screen" class="overlay hidden">
    <h1>🏆 SEIER!</h1>
    <p id="victory-score"></p>
    <p id="victory-coins"></p>
    <div class="start-btns">
      <button id="victory-restart-btn">SPILL IGJEN</button>
      <button id="victory-shop-btn" class="btn-shop">BUTIKK</button>
    </div>
  </div>

  <!-- Three.js canvas -->
  <canvas id="game-canvas"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game.js?v=4"></script>
</body>
</html>
